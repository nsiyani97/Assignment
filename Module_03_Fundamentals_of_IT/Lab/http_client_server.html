<!DOCTYPE html>
<html>
  <head>
    <title>HTTP Client</title>
  </head>
  <body>
    <button onclick="fetchData()">Send Request</button>
    <p id="output"></p>

    <script>
      function fetchData() {
        fetch("https://jsonplaceholder.typicode.com/posts/1")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("output").innerText = data.title;
          });
      }
    </script>
  </body>
</html>
