<!DOCTYPE html>
<html>
  <head>
    <title>Digital Clock</title>
  </head>
  <body>
    <h2>Digital Clock</h2>
    <h1 id="clock"></h1>

    <script>
      function updateClock() {
        let now = new Date();
        let time = now.toLocaleTimeString();
        document.getElementById("clock").innerHTML = time;
      }

      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
