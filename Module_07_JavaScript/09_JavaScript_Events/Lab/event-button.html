<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript Event Example</title>
  </head>
  <body>
    <h2>JavaScript Events Demo</h2>
    <button id="myButton">Click Me</button>

    <script>
      var button = document.getElementById("myButton");

      button.addEventListener("click", function () {
        alert("Button clicked!");
      });
    </script>
  </body>
</html>
