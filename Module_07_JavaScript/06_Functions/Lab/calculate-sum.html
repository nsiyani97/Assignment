<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculate Sum</title>
  </head>
  <body>
    <h2>Calculate Sum Function</h2>

    <script>
      function calculateSum(a, b) {
        return a + b;
      }

      let result = calculateSum(10, 20);
      document.write("Sum is: " + result);
    </script>
  </body>
</html>
