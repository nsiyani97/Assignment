<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>If-Else Example</title>
  </head>
  <body>
    <h2>If-Else Control Flow</h2>

    <script>
      let number = 0;

      if (number > 0) {
        console.log("The number is Positive");
      } else if (number < 0) {
        console.log("The number is Negative");
      } else {
        console.log("The number is Zero");
      }
    </script>
  </body>
</html>
