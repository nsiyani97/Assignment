<!DOCTYPE html>
<html>
  <head>
    <title>While Loop</title>
  </head>
  <body>
    <h2>Sum of Even Numbers (1 to 20)</h2>

    <script>
      let i = 1;
      let sum = 0;

      while (i <= 20) {
        if (i % 2 === 0) {
          sum += i;
        }
        i++;
      }

      document.write("Sum of even numbers: " + sum);
    </script>
  </body>
</html>
