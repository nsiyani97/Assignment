<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sum of Array Elements</title>
  </head>
  <body>
    <h2>Sum of Array Elements</h2>

    <script>
      let numbers = [10, 20, 30, 40];
      let sum = 0;

      for (let i = 0; i < numbers.length; i++) {
        sum += numbers[i];
      }

      console.log("Sum of array elements:", sum);
    </script>
  </body>
</html>
