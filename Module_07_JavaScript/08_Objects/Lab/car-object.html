<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript Object Example</title>
  </head>
  <body>
    <h2>JavaScript Object - Car Example</h2>

    <script>
      let car = {
        brand: "Toyota",
        model: "Corolla",
        year: 2020,
      };

      console.log("Brand:", car.brand);
      console.log("Model:", car.model);

      car.year = 2023;

      car.color = "White";

      console.log("Updated Car Object:", car);
    </script>
  </body>
</html>
