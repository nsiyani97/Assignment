<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript Operators Lab</title>
  </head>
  <body>
    <h2>JavaScript Operators Demo</h2>
    <p>Open the browser console to view the output.</p>

    <script>
      // Declare two numbers
      let a = 20;
      let b = 4;

      // Arithmetic operators
      console.log("Addition:", a + b);
      console.log("Subtraction:", a - b);
      console.log("Multiplication:", a * b);
      console.log("Division:", a / b);

      // Comparison operators
      console.log("Are a and b equal?", a == b);
      console.log("Is a greater than b?", a > b);

      // Logical operators
      console.log("Are both conditions true (a > 10 && b < 5)?", a > 10 && b < 5);
    </script>
  </body>
</html>
