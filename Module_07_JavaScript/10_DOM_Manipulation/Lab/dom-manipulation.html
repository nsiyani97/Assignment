<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Manipulation</title>
  </head>
  <body>
    <p id="text">Hello, World!</p>

    <script>
      var paragraph = document.getElementById("text");

      paragraph.innerHTML = "JavaScript is fun!";

      paragraph.style.color = "blue";
    </script>
  </body>
</html>
