<!DOCTYPE html>
<html>
  <head>
    <title>Product Catalog</title>
  </head>
  <body>
    <table style="border: 1px solid black; border-collapse: collapse; width: 100%">
      <thead>
        <tr>
          <th style="border: 1px solid black">Product Name</th>
          <th style="border: 1px solid black">Product Image</th>
          <th style="border: 1px solid black">Price</th>
          <th style="border: 1px solid black">Description</th>
          <th style="border: 1px solid black">Availability</th>
        </tr>
      </thead>

      <tr>
        <td style="border: 1px solid black">Laptop</td>
        <td style="border: 1px solid black">
          <img src="https://via.placeholder.com/80" alt="Laptop" />
        </td>
        <td style="border: 1px solid black">₹50,000</td>
        <td style="border: 1px solid black">High performance laptop</td>
        <td style="border: 1px solid black">In Stock</td>
      </tr>

      <tr>
        <td style="border: 1px solid black">Smartphone</td>
        <td style="border: 1px solid black">
          <img src="https://via.placeholder.com/80" alt="Phone" />
        </td>
        <td style="border: 1px solid black">₹20,000</td>
        <td style="border: 1px solid black" colspan="2">Out of stock currently</td>
      </tr>

      <tr>
        <td style="border: 1px solid black" rowspan="2">Accessories</td>
        <td style="border: 1px solid black">
          <img src="https://via.placeholder.com/80" alt="Mouse" />
        </td>
        <td style="border: 1px solid black">₹500</td>
        <td style="border: 1px solid black">Wireless Mouse</td>
        <td style="border: 1px solid black">In Stock</td>
      </tr>

      <tr>
        <td style="border: 1px solid black">
          <img src="https://via.placeholder.com/80" alt="Keyboard" />
        </td>
        <td style="border: 1px solid black">₹700</td>
        <td style="border: 1px solid black">Mechanical Keyboard</td>
        <td style="border: 1px solid black">In Stock</td>
      </tr>
    </table>
  </body>
</html>
